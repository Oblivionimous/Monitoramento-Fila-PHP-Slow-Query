; =============================================================================
; Exemplo de configuracao PHP-FPM para habilitar a pagina de status
;
; O script monitor_app.sh precisa acessar a pagina de status do PHP-FPM
; para coletar metricas do pool de processos.
;
; Instrucoes:
;   1. Localize o arquivo de configuracao do pool PHP-FPM:
;      - Debian/Ubuntu: /etc/php/<versao>/fpm/pool.d/www.conf
;      - RHEL/CentOS/Rocky: /etc/php-fpm.d/www.conf
;
;   2. Adicione ou descomente as linhas abaixo no arquivo do pool
;
;   3. Reinicie o PHP-FPM:
;      systemctl restart php-fpm
;
;   4. Teste o acesso:
;      curl http://127.0.0.1:8000/status
;      curl http://127.0.0.1:8000/status?full
; =============================================================================

; Habilita a pagina de status do PHP-FPM
; O caminho /status sera acessado pelo script monitor_app.sh
pm.status_path = /status

; (Opcional) Habilitar escuta dedicada para status em porta separada
; Util quando o PHP-FPM escuta via socket Unix e voce quer acessar
; o status via HTTP sem depender do web server (Nginx/Apache)
; pm.status_listen = 127.0.0.1:8000

; =============================================================================
; Se o PHP-FPM ja escuta em uma porta TCP (ex: 127.0.0.1:9000),
; voce pode acessar o status diretamente por essa porta.
; Nesse caso, ajuste a variavel FPM_STATUS no monitor_app.sh:
;   FPM_STATUS="http://127.0.0.1:9000/status"
;
; Se o PHP-FPM escuta via socket Unix, configure o web server
; (Nginx ou Apache) para expor o endpoint /status, ou use
; a diretiva pm.status_listen acima.
; =============================================================================

; Exemplo de configuracao Nginx para expor /status:
;
;   location = /status {
;       access_log off;
;       allow 127.0.0.1;
;       deny all;
;       fastcgi_pass unix:/run/php-fpm/www.sock;
;       fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
;       include fastcgi_params;
;   }
